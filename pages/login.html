<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン | 稟議書管理システム</title>
    <link rel="stylesheet" href="../assets/css/login.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header">
                <h1>稟議書管理システム</h1>
            </div>
            
            <div class="login-body">
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">ログインID (社員番号)</label>
                        <input type="text" id="username" name="username" class="input-control" required autofocus>
                    </div>
                    
                    <div id="login-error" class="error-message" style="display: none;">
                        IDが間違っています。
                    </div>
                    
                    <div class="btn-area">
                        <button type="submit" id="btn-login" class="btn-submit">ログイン</button>
                    </div>
                </form>
            </div>
            
            <div class="login-footer">
                &copy; 2026 稟議管理システム
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/modules/auth.js"></script>
    <script src="../assets/js/modules/login.js"></script>

</body>
</html>
