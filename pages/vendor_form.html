<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取引先契約稟議 | 稟議書管理システム</title>
    
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/contract_form.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container">
    <h1>取引先契約稟議</h1>

    <form id="vendor-form">
        
        <div class="section" style="margin-bottom: 30px;">
            <div class="form-group" style="border-bottom: none; margin-bottom: 15px;">
                <label class="form-label required">稟議書No</label>
                <div class="form-control-wrapper">
                    <input type="text" name="id_doc" id="id_doc" class="input-readonly w-large" style="font-weight: bold; font-size: 15px;" readonly placeholder="自動採番">
                </div>
            </div>

            <div class="form-group" style="border-bottom: none; margin-bottom: 15px;">
                <label class="form-label">申請者</label>
                <div class="form-control-wrapper">
                    <input type="text" id="applicant-name" class="input-readonly w-large" readonly>
                </div>
            </div>

            <div class="form-group" style="border-bottom: none;">
                <label class="form-label">申請日</label>
                <div class="form-control-wrapper">
                    <input type="date" id="apply-date" name="ts_applied" class="input-readonly w-large" readonly>
                </div>
            </div>
        </div>

        <h2>会社基本情報</h2>
        <div class="section">
            <div class="form-group">
                <label class="form-label required">商号、屋号</label>
                <div class="form-control-wrapper">
                    <input type="text" name="s_name" id="s_name" class="w-large" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">フリガナ</label>
                <div class="form-control-wrapper">
                    <input type="text" name="s_kana" id="s_kana" class="w-large" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">事業所郵便番号</label>
                <div class="form-control-wrapper flex-row">
                    <input type="text" name="zip1" id="zip1" class="w-small" maxlength="3" required> -
                    <input type="text" name="zip2" id="zip2" class="w-small-plus" maxlength="4" required>
                    <button type="button" class="btn-secondary btn-sm btn-address-search" onclick="AjaxZip3.zip2addr('zip1', 'zip2', 's_office_address', 's_office_address');">住所検索</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">事業所住所</label>
                <div class="form-control-wrapper flex-column" style="gap: 8px;">
                    <input type="text" name="s_office_address" class="w-large" placeholder="住所" required>
                    <input type="text" name="s_office_address2" class="w-large" placeholder="ビル名・階数など">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">事業所TEL</label>
                <div class="form-control-wrapper flex-row">
                    <input type="text" name="tel1" class="w-small" maxlength="5" required> -
                    <input type="text" name="tel2" class="w-small-plus" maxlength="4" required> -
                    <input type="text" name="tel3" class="w-small-plus" maxlength="4" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">郵送先</label>
                <div class="form-control-wrapper">
                    <label><input type="radio" name="n_send_to" value="1" checked> 事業所</label>
                    <label><input type="radio" name="n_send_to" value="2"> 代表者自宅</label>
                    <label><input type="radio" name="n_send_to" value="9"> その他</label>
                </div>
            </div>

            <div class="form-group send-to-others-group" style="display: none; border-bottom: none;">
                <label class="form-label label-gray">郵送先 その他</label>
                <div class="form-control-wrapper">
                    <input type="text" name="s_send_to_others" class="w-large" placeholder="その他の郵送先住所">
                </div>
            </div>
        </div>

        <h2>代表者情報</h2>
        <div class="section">
            <div class="form-group">
                <label class="form-label required">氏名</label>
                <div class="form-control-wrapper flex-row">
                    <input type="text" name="rep_name_sei" id="rep_name_sei" class="w-small-plus" placeholder="姓" required>
                    <input type="text" name="rep_name_mei" id="rep_name_mei" class="w-small-plus" placeholder="名" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">フリガナ</label>
                <div class="form-control-wrapper flex-row">
                    <input type="text" name="rep_kana_sei" id="rep_kana_sei" class="w-small-plus" placeholder="セイ" required>
                    <input type="text" name="rep_kana_mei" id="rep_kana_mei" class="w-small-plus" placeholder="メイ" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">肩書き</label>
                <div class="form-control-wrapper">
                    <label><input type="radio" name="s_rep_title" value="1" checked> 代表取締役</label>
                    <label><input type="radio" name="s_rep_title" value="2"> 取締役</label>
                    <label><input type="radio" name="s_rep_title" value="3"> 理事長</label>
                    <label><input type="radio" name="s_rep_title" value="4"> 代表社員</label>
                    <label><input type="radio" name="s_rep_title" value="9"> その他</label>
                </div>
            </div>

            <div class="form-group rep-title-others-group" style="display: none; border-bottom: none;">
                <label class="form-label label-gray">肩書き その他</label>
                <div class="form-control-wrapper">
                    <input type="text" name="s_rep_title_others" class="w-large" placeholder="その他の肩書き">
                </div>
            </div>
        </div>

        <h2>今回契約</h2>
        <div class="section">
            <div class="form-group">
                <label class="form-label">契約概要</label>
                <div class="form-control-wrapper">
                    <textarea name="s_contract_overview" class="w-large"></textarea>
                </div>
            </div>

            <div class="form-group" style="border-bottom: none;">
                <label class="form-label required">きっかけ・経緯</label>
                <div class="form-control-wrapper">
                    <textarea name="s_situation" class="w-large" required></textarea>
                </div>
            </div>
        </div>

        <h2>添付書類</h2>
        <div class="section">
            <div class="form-group" style="border-bottom: none;">
                <label class="form-label required" style="color: #333;">見積書（PDF）</label>
                <div class="form-control-wrapper file-upload-container">
                    <!-- PERBAIKAN: name diubah menjadi estimate_file sesuai controller backend -->
                    <input type="file" id="estimate_file" name="estimate_file" style="display: none;" accept=".pdf" required>
                    <button type="button" class="btn-choose-file" onclick="document.getElementById('estimate_file').click()">ファイルを選択</button>
                    
                    <div class="file-badge">
                        <i class="fas fa-file-pdf"></i> <span id="file-name-display">選択されていません</span>
                    </div>
                    <div style="width: 100%; font-size: 11px; color: #dc3545; font-weight: bold; margin-top: 5px;">※注意事項: 請求書（インボイス）は添付しない</div>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <span class="route-title">承認ルート</span>
                <table class="approval-table">
                    <thead>
                        <tr>
                            <th width="33%">承認順位</th>
                            <th width="33%">承認日時</th>
                            <th width="34%">承認者名</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="3" style="text-align: center;">(申請後に確定します)</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="btn-area-custom">
            <button type="button" class="btn-custom btn-c-red" onclick="window.history.back();">キャンセル</button>
            <button type="button" id="btn-save-draft" class="btn-custom btn-c-gray">下書き保存</button>
            <button type="submit" class="btn-custom btn-c-blue">申請</button>
        </div>

    </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://ajaxzip3.github.io/ajaxzip3.js"></script>
<script src="../assets/js/jquery.autoKana.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/modules/vendor-form.js"></script> 

</body>
</html>
