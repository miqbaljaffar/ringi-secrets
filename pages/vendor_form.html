<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>取引先契約稟議 | 稟議書管理システム</title>
    
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/contract_form.css">
    
    <link rel="stylesheet" href="../assets/css/vendor_custom.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="container">
    <h1>取引先契約稟議</h1>

    <form id="vendor-form">
        
        <div class="section" style="margin-bottom: 30px;">
            <div class="form-group" style="border-bottom: none; margin-bottom: 15px;">
                <label class="form-label required">稟議書No</label>
                <div class="form-control-wrapper">
                    <span style="font-weight: bold; font-size: 15px;">CV251205</span>
                    <input type="hidden" name="id_doc" id="id_doc" value="CV251205">
                </div>
            </div>

            <div class="form-group" style="border-bottom: none; margin-bottom: 15px;">
                <label class="form-label">申請者</label>
                <div class="form-control-wrapper">
                    <input type="text" id="applicant-name" class="input-readonly w-large" readonly>
                </div>
            </div>

            <div class="form-group" style="border-bottom: none;">
                <label class="form-label">申請日</label>
                <div class="form-control-wrapper">
                    <input type="text" id="apply-date" name="ts_applied" class="input-readonly w-large" readonly value="09/02/2026">
                </div>
            </div>
        </div>

        <h2>会社基本情報</h2>
        <div class="section">
            <div class="form-group">
                <label class="form-label required">商号、屋号</label>
                <div class="form-control-wrapper">
                    <input type="text" name="s_name" id="s_name" class="w-large" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">フリガナ</label>
                <div class="form-control-wrapper">
                    <input type="text" name="s_kana" id="s_kana" class="w-large" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">事業所郵便番号</label>
                <div class="form-control-wrapper flex-row">
                    <input type="text" name="zip1" class="w-small" maxlength="3">
                    <input type="text" name="zip2" class="w-small-plus" maxlength="4">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">事業所住所</label>
                <div class="form-control-wrapper flex-column" style="gap: 8px;">
                    <input type="text" name="s_office_address" class="w-large" required>
                    <input type="text" name="s_office_address2" class="w-large">
                    <input type="text" name="s_office_address3" class="w-large">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">事業所TEL</label>
                <div class="form-control-wrapper flex-row">
                    <input type="text" name="tel1" class="w-small">
                    <input type="text" name="tel2" class="w-small-plus">
                    <input type="text" name="tel3" class="w-small-plus">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">郵送先</label>
                <div class="form-control-wrapper">
                    <label><input type="radio" name="n_send_to" value="1" checked> 事業所</label>
                    <label><input type="radio" name="n_send_to" value="2"> 代表者自宅</label>
                    <label><input type="radio" name="n_send_to" value="9"> その他</label>
                </div>
            </div>

            <div class="form-group" style="border-bottom: none;">
                <label class="form-label label-gray">郵送先 その他</label>
                <div class="form-control-wrapper">
                    <input type="text" name="s_send_to_others" class="w-large">
                </div>
            </div>
        </div>

        <h2>代表者情報</h2>
        <div class="section">
            <div class="form-group">
                <label class="form-label required">氏名</label>
                <div class="form-control-wrapper">
                    <input type="text" name="s_rep_name_1" class="w-large" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">フリガナ</label>
                <div class="form-control-wrapper">
                    <input type="text" name="s_rep_kana_1" class="w-large" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">肩書き</label>
                <div class="form-control-wrapper">
                    <label><input type="radio" name="s_rep_title" value="1"> 代表取締役</label>
                    <label><input type="radio" name="s_rep_title" value="2"> 取締役</label>
                    <label><input type="radio" name="s_rep_title" value="3"> 理事長</label>
                    <label><input type="radio" name="s_rep_title" value="4"> 代表社員</label>
                    <label><input type="radio" name="s_rep_title" value="9"> その他</label>
                </div>
            </div>

            <div class="form-group" style="border-bottom: none;">
                <label class="form-label label-gray">フリガナ</label>
                <div class="form-control-wrapper">
                    <input type="text" name="s_rep_title_others" class="w-large">
                </div>
            </div>
        </div>

        <h2>今回契約</h2>
        <div class="section">
            <div class="form-group">
                <label class="form-label required">契約概要</label>
                <div class="form-control-wrapper">
                    <div class="input-icon-wrapper">
                        <input type="text" name="s_contract_overview" required>
                        <i class="far fa-calendar-alt"></i>
                    </div>
                </div>
            </div>

            <div class="form-group" style="border-bottom: none;">
                <label class="form-label required">きっかけ</label>
                <div class="form-control-wrapper">
                    <textarea name="s_situation" class="w-large" required></textarea>
                </div>
            </div>
        </div>

        <h2>添付書類</h2>
        <div class="section">
            <div class="form-group" style="border-bottom: none;">
                <label class="form-label required" style="color: #333;">見積書（PDF）</label>
                <div class="form-control-wrapper file-upload-container">
                    <input type="file" id="file_estimate" name="file_estimate" style="display: none;" accept=".pdf">
                    <button type="button" class="btn-choose-file" onclick="document.getElementById('file_estimate').click()">Choosen file</button>
                    
                    <div class="file-badge">
                        <i class="fas fa-file-pdf"></i> 見積書.pdf
                    </div>
                </div>
            </div>

            <div style="margin-top: 30px;">
                <span class="route-title">承認ルート</span>
                <table class="approval-table">
                    <thead>
                        <tr>
                            <th width="33%">承認順位</th>
                            <th width="33%">承認日時</th>
                            <th width="34%">承認者名</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td></td>
                            <td></td>
                            <td></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="btn-area-custom">
            <button type="button" class="btn-custom btn-c-red" onclick="window.history.back();">キャンセル</button>
            <button type="button" id="btn-save-draft" class="btn-custom btn-c-gray">下書き保存</button>
            <button type="submit" class="btn-custom btn-c-blue">申請</button>
        </div>

    </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/js/jquery.autoKana.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/modules/vendor-form.js"></script> 
<script src="../assets/js/modules/vendor_custom.js"></script>

</body>
</html>
