<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通常稟議申請 | 稟議書管理システム</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="container">
    <h1>通常稟議</h1>

    <form id="common-form">
        <div class="section">
            <div class="form-group">
                <label class="form-label required">稟議書No</label>
                <div class="form-control-wrapper">
                    <input type="text" name="id_doc" id="doc-number" readonly placeholder="自動採番 (Auto)">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">申請者</label>
                <div class="form-control-wrapper">
                     <input type="text" id="applicant-name" readonly>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">申請日</label>
                <div class="form-control-wrapper">
                     <input type="date" name="ts_applied" id="application-date" readonly>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">業務区分</label>
                <div class="form-control-wrapper">
                     <label><input type="radio" name="n_type" value="1" checked> 部課</label>
                     <label><input type="radio" name="n_type" value="2"> 委員会</label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">所属</label>
                <div class="form-control-wrapper">
                     <input type="text" id="department-name" readonly>
                </div>
            </div>
        </div>

        <h2>稟議内容・金額</h2>
        <div class="section">
            <div class="form-group">
                <label class="form-label required">件名</label>
                <div class="form-control-wrapper">
                     <input type="text" name="s_title" required maxlength="30">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">実施期限</label>
                <div class="form-control-wrapper">
                     <input type="date" name="dt_deadline" id="deadline" required style="max-width: 200px;">
                </div>
            </div>

            <div class="form-group" style="align-items: flex-start;">
                <label class="form-label required">概要・理由</label>
                <div class="form-control-wrapper">
                     <textarea name="s_overview" required placeholder="品名、金額の内訳等の詳細や申請理由を記入"></textarea>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">金額（総額）</label>
                <div class="form-control-wrapper">
                    <span id="total-amount" style="font-size: 16px; font-weight: bold; color: #0088cc;">0 円</span>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <div class="detail-grid-header">
                    <div style="width: 30%;">分類</div>
                    <div style="width: 40%;">支払先</div>
                    <div style="width: 25%;">金額</div>
                    <div style="width: 5%;"></div>
                </div>
                
                <div id="details-container" style="max-height: 250px; overflow-y: auto; overflow-x: hidden;">
                </div>
                
                <button type="button" id="add-detail-btn" class="btn-add-detail">＋ 明細を追加</button>
            </div>
        </div>

        <h2>添付書類</h2>
        <div class="section">
            <div class="form-group">
                <label class="form-label">ファイルアップ<br>ロード（PDF）</label>
                <div class="form-control-wrapper">
                    <input type="file" id="file-upload" name="attachment" accept=".pdf" style="border:none; padding:0;">
                    <span id="file-name-display" style="font-size: 12px; margin-left: 10px; font-weight: bold;"></span>
                </div>
            </div>

            <div class="form-group" style="align-items: flex-start;">
                <label class="form-label">添付書類</label>
                <div class="form-control-wrapper">
                    <label><input type="radio" name="s_file_type" value="収支予算書"> 収支予算書</label>
                    <label><input type="radio" name="s_file_type" value="見積書"> 見積書</label>
                    <label><input type="radio" name="s_file_type" value="パンフレット"> パンフレット</label>
                    <label><input type="radio" name="s_file_type" value="その他" checked> その他</label>
                    <input type="text" id="file-type-others" style="margin-top: 8px;">
                </div>
            </div>
        </div>

        <div class="section" style="margin-top: 30px;">
            <span style="font-size: 14px; font-weight: bold; margin-bottom: 5px; display: block; color: #0088cc;">承認ルート</span>
            <div id="approval-route" style="background: #f8f9fa; padding: 15px; border: 1px solid #ddd; border-radius: 4px;">
                読み込み中...
            </div>
        </div>

        <div class="btn-area">
            <button type="button" id="btn-save-draft" class="btn btn-gray">下書き保存 (Draft)</button>
            <button type="button" id="btn-cancel" class="btn btn-red">キャンセル (Cancel)</button>
            <button type="submit" id="btn-submit" class="btn btn-blue">申請 (Apply)</button>
        </div>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/modules/auth.js"></script>
<script src="../assets/js/modules/common-form.js"></script>
</body>
</html>
