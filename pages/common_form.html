<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通常稟議申請 | 稟議書管理システム</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<div class="container">
    <h1>通常稟議</h1>

    <form id="common-form">
        <div class="section">
            <div class="form-group">
                <label class="form-label required">稟議書No</label>
                <div class="form-control-wrapper">
                    <input type="text" name="id_doc" id="doc-number" readonly value="AR25031600">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">申請者</label>
                <div class="form-control-wrapper">
                     <input type="text" id="applicant-name" readonly>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">申請日</label>
                <div class="form-control-wrapper">
                     <input type="text" name="ts_applied" id="application-date" readonly>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">業務区分</label>
                <div class="form-control-wrapper">
                     <label><input type="radio" name="n_type" value="1" checked> 部課</label>
                     <label><input type="radio" name="n_type" value="2"> 委員会</label>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">所属</label>
                <div class="form-control-wrapper">
                     <input type="text" id="department-name" readonly>
                </div>
            </div>
        </div>

        <h2>稟議内容・金額</h2>
        <div class="section">
            <div class="form-group">
                <label class="form-label required">件名</label>
                <div class="form-control-wrapper">
                     <input type="text" name="s_title" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label required">実施期限</label>
                <div class="form-control-wrapper">
                     <input type="date" name="dt_deadline" id="deadline" required style="max-width: 200px;">
                </div>
            </div>

            <div class="form-group" style="align-items: flex-start;">
                <label class="form-label required">概要・理由</label>
                <div class="form-control-wrapper">
                     <textarea name="s_overview" required></textarea>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">金額（総額）</label>
                <div class="form-control-wrapper">
                    <span id="total-amount" style="font-size: 16px;">0 円</span>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <div class="detail-grid-header">
                    <div style="width: 30%;">分類</div>
                    <div style="width: 40%;">支払先</div>
                    <div style="width: 25%;">金額</div>
                    <div style="width: 5%;"></div>
                </div>
                
                <div id="details-container">
                </div>
                
                <button type="button" id="add-detail-btn" class="btn-add-detail">＋ 明細を追加</button>
            </div>
        </div>

        <h2>添付書類</h2>
        <div class="section">
            <div class="form-group">
                <label class="form-label">ファイルアップ<br>ロード（PDF）</label>
                <div class="form-control-wrapper">
                    <input type="file" id="file-upload" name="file_upload" accept=".pdf" style="border:none; padding:0;">
                </div>
            </div>

            <div class="form-group" style="align-items: flex-start;">
                <label class="form-label">添付書類</label>
                <div class="form-control-wrapper">
                    <label><input type="radio" name="s_file_type" value="収支予算書"> 収支予算書</label>
                    <label><input type="radio" name="s_file_type" value="見積書"> 見積書</label>
                    <label><input type="radio" name="s_file_type" value="パンフレット"> パンフレット</label>
                    <label><input type="radio" name="s_file_type" value="その他" checked> その他</label>
                    <input type="text" id="file-type-others" style="margin-top: 8px;">
                </div>
            </div>
        </div>

        <div class="section" style="margin-top: 30px;">
            <span style="font-size: 12px; font-weight: bold; margin-bottom: 5px; display: block;">承認ルート</span>
            <table class="approval-table">
                <thead>
                    <tr>
                        <th width="30%">承認順位</th>
                        <th width="30%">承認日時</th>
                        <th width="40%">承認者名</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td></td>
                        <td></td>
                        <td></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="btn-area">
            <button type="button" id="btn-save-draft" class="btn btn-gray">申請</button>
            <button type="button" id="btn-withdraw" class="btn btn-red">取下げ</button>
            <button type="submit" id="btn-submit" class="btn btn-blue">手配完了</button>
        </div>
    </form>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/modules/common-form.js"></script>
</body>
</html>
