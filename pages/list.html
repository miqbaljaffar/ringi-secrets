<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>申請書一覧 | 稟議書管理システム</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/list.css">
</head>
<body>

<div id="app" class="list-wrapper">
    <div class="top-header" style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #75bced;">
        <div class="user-info" style="margin-right: 15px; font-size: 14px; font-weight: bold; color: #005580;">
            <i class="fas fa-user-circle"></i> <span id="user-name-role">読み込み中...</span>
        </div>
        <button type="button" id="btn-logout" class="btn btn-red" style="height: 32px; padding: 0 15px; display: inline-flex; align-items: center; gap: 5px; font-size: 13px;">
            <i class="fas fa-sign-out-alt"></i> ログアウト (Logout)
        </button>
    </div>

    <h1 id="dynamic-page-title" class="page-title">通常の承認一覧</h1>

    <div class="search-container">
        <form id="search-form" class="search-form">
            <div class="form-row type-row">
                <span class="label-title">稟議種別</span>
                <div class="radio-group">
                    <label><input type="radio" name="form_type" value="common" checked> 通常</label>
                    <label><input type="radio" name="form_type" value="tax"> 税務契約</label>
                    <label><input type="radio" name="form_type" value="contract"> その他契約</label>
                    <label><input type="radio" name="form_type" value="vendor"> 取引先契約</label>
                </div>
            </div>

            <div class="form-row input-row">
                <div class="form-item date-group">
                    <label>日付</label>
                    <div class="date-inputs">
                        <input type="date" name="date_start" class="input-date">
                        <span class="tilde">～</span>
                        <input type="date" name="date_end" class="input-date">
                    </div>
                </div>

                <div class="form-item">
                    <label>申請者</label>
                    <input type="text" name="applicant_name" class="input-text" placeholder="">
                </div>

                <div class="form-item common-only" style="display: none;">
                    <label>分類</label>
                    <select name="n_category" class="input-select">
                        <option value="">すべて</option>
                        <option value="1">書籍購入</option>
                        <option value="2">物品購入(1万円以上)</option>
                        <option value="3">役務の提供</option>
                        <option value="4">教育研修費</option>
                        <option value="5">会場費</option>
                        <option value="6">交際費</option>
                        <option value="7">厚生費</option>
                        <option value="8">広告協賛</option>
                        <option value="9">外注</option>
                    </select>
                </div>

                <div class="form-item">
                    <label>キーワード</label>
                    <input type="text" id="search-keyword" name="keyword" class="input-text" placeholder="">
                </div>

                <div class="form-item common-only" style="display: none;">
                    <label>支払先</label>
                    <input type="text" name="payer" class="input-text" placeholder="">
                </div>

                <div class="action-buttons">
                    <button type="button" id="btn-search" class="btn btn-search-style">
                        <i class="fas fa-search"></i> 検索
                    </button>
                    <a href="contract_form.html" id="btn-create-new" class="btn btn-create-style">
                        <i class="fas fa-plus"></i> 新規作成
                    </a>
                </div>
            </div>
        </form>
    </div>

    <div class="tab-container">
        <button class="tab-btn active" data-tab="all">すべて</button>
        <button class="tab-btn" data-tab="pending">承認待ち</button>
        <button class="tab-btn" data-tab="approved">承認済み</button>
        <button class="tab-btn" data-tab="rejected">否認・取下</button>
        <button class="tab-btn" data-tab="to_approve" style="position: relative;">
            要承認 <span class="badge" id="badge-to-approve" style="display:none;">0</span>
        </button>
    </div>

    <div class="table-container pc-only">
        <table class="custom-table">
            <thead id="list-header">
            </thead>
            <tbody id="list-container">
                <tr><td colspan="8" class="text-center">Loading...</td></tr>
            </tbody>
        </table>
    </div>
    
    <div id="list-container-sp" class="sp-only table-container"></div>
    
    <div id="empty-state" class="text-center empty-msg" style="display:none;">
        データがありません
    </div>
    <div id="loading-indicator" class="text-center empty-msg" style="display:none;">
        <i class="fas fa-spinner fa-spin"></i> 読み込み中...
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="../assets/js/main.js"></script>
<script src="../assets/js/modules/list.js"></script>

</body>
</html>
